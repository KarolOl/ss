<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XML na YAML</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
      line-height: 1.4;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #172033;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 420px;
      padding: 12px;
      border: 1px solid #b8c2d6;
      border-radius: 8px;
      font: 14px/1.45 Consolas, "Courier New", monospace;
      resize: vertical;
      background: #fff;
      color: #111827;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: #1d4ed8;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    #message {
      min-height: 22px;
      color: #b91c1c;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      body {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>XML na YAML</h1>

    <div class="grid">
      <section>
        <label for="xmlInput">XML</label>
        <textarea id="xmlInput" spellcheck="false"><LocalStore>
  <CACertificate>
    <x509Certificate>cert</x509Certificate>
    <OCSP>cert</OCSP>
    <CRL>cert</CRL>
  </CACertificate>
  <CACertificate>
    <x509Certificate>cert</x509Certificate>
    <OCSP>cert</OCSP>
    <CRL>cert</CRL>
  </CACertificate>
</LocalStore></textarea>
      </section>

      <section>
        <label for="yamlOutput">YAML</label>
        <textarea id="yamlOutput" spellcheck="false" readonly></textarea>
      </section>
    </div>

    <div class="actions">
      <button id="convertButton" type="button">Konwertuj</button>
      <button id="copyButton" class="secondary" type="button">Kopiuj YAML</button>
    </div>

    <div id="message" role="status" aria-live="polite"></div>
  </main>

  <script>
    const xmlInput = document.getElementById("xmlInput");
    const yamlOutput = document.getElementById("yamlOutput");
    const message = document.getElementById("message");
    const convertButton = document.getElementById("convertButton");
    const copyButton = document.getElementById("copyButton");

    function parseXml(xmlText) {
      const parser = new DOMParser();
      const documentXml = parser.parseFromString(xmlText, "application/xml");
      const parserError = documentXml.querySelector("parsererror");

      if (parserError) {
        throw new Error("Niepoprawny XML. Sprawdz, czy wszystkie tagi sa domkniete.");
      }

      return documentXml.documentElement;
    }

    function xmlElementToObject(element) {
      const childElements = Array.from(element.children);
      const attributes = Array.from(element.attributes);

      if (childElements.length === 0 && attributes.length === 0) {
        return normalizeText(element.textContent);
      }

      const result = {};

      for (const attribute of attributes) {
        result[`@${attribute.name}`] = attribute.value;
      }

      for (const child of childElements) {
        const value = xmlElementToObject(child);

        if (Object.prototype.hasOwnProperty.call(result, child.tagName)) {
          if (!Array.isArray(result[child.tagName])) {
            result[child.tagName] = [result[child.tagName]];
          }

          result[child.tagName].push(value);
        } else {
          result[child.tagName] = value;
        }
      }

      const ownText = Array.from(element.childNodes)
        .filter((node) => node.nodeType === Node.TEXT_NODE)
        .map((node) => normalizeText(node.textContent))
        .filter(Boolean)
        .join(" ");

      if (ownText) {
        result["#text"] = ownText;
      }

      return result;
    }

    function normalizeText(text) {
      return text.replace(/\s+/g, " ").trim();
    }

    function objectToYaml(value, indent = 0) {
      if (Array.isArray(value)) {
        return value.map((item) => yamlListItem(item, indent)).join("\n");
      }

      if (isPlainObject(value)) {
        return Object.entries(value)
          .map(([key, item]) => yamlKeyValue(key, item, indent))
          .join("\n");
      }

      return `${" ".repeat(indent)}${formatScalar(value)}`;
    }

    function yamlKeyValue(key, value, indent) {
      const spaces = " ".repeat(indent);

      if (Array.isArray(value)) {
        return `${spaces}${key}:\n${objectToYaml(value, indent + 2)}`;
      }

      if (isPlainObject(value)) {
        return `${spaces}${key}:\n${objectToYaml(value, indent + 2)}`;
      }

      return `${spaces}${key}: ${formatScalar(value)}`;
    }

    function yamlListItem(value, indent) {
      const spaces = " ".repeat(indent);

      if (isPlainObject(value)) {
        const entries = Object.entries(value);

        if (entries.length === 0) {
          return `${spaces}- {}`;
        }

        const [firstKey, firstValue] = entries[0];
        const firstLine = yamlKeyValue(firstKey, firstValue, 0);
        const rest = entries
          .slice(1)
          .map(([key, item]) => yamlKeyValue(key, item, indent + 2))
          .join("\n");

        return rest
          ? `${spaces}- ${firstLine}\n${rest}`
          : `${spaces}- ${firstLine}`;
      }

      if (Array.isArray(value)) {
        return `${spaces}-\n${objectToYaml(value, indent + 2)}`;
      }

      return `${spaces}- ${formatScalar(value)}`;
    }

    function formatScalar(value) {
      if (value === "") {
        return "\"\"";
      }

      const text = String(value);
      const canStayPlain = /^[A-Za-z0-9_./ -]+$/.test(text)
        && !/^(true|false|null|yes|no|on|off)$/i.test(text)
        && !/^-?\d+(\.\d+)?$/.test(text);

      if (canStayPlain) {
        return text;
      }

      return JSON.stringify(text);
    }

    function isPlainObject(value) {
      return value !== null && typeof value === "object" && !Array.isArray(value);
    }

    function convertXmlToYaml() {
      message.textContent = "";

      try {
        const rootElement = parseXml(xmlInput.value);
        const rootObject = {
          [rootElement.tagName]: xmlElementToObject(rootElement)
        };

        yamlOutput.value = objectToYaml(rootObject);
      } catch (error) {
        yamlOutput.value = "";
        message.textContent = error.message;
      }
    }

    convertButton.addEventListener("click", convertXmlToYaml);
    xmlInput.addEventListener("input", convertXmlToYaml);

    copyButton.addEventListener("click", async () => {
      if (!yamlOutput.value) {
        return;
      }

      try {
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(yamlOutput.value);
        } else {
          yamlOutput.select();
          document.execCommand("copy");
        }

        message.textContent = "Skopiowano YAML.";
      } catch (error) {
        yamlOutput.select();
        message.textContent = "Nie udalo sie skopiowac automatycznie.";
      }
    });

    convertXmlToYaml();
  </script>
</body>
</html>
