<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multipart Spring Demo</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="shell">
    <section class="panel">
        <div id="userBar" class="user-bar" hidden>
            <span id="userGreeting" class="user-greeting"></span>
            <div class="user-menu">
                <button id="userMenuButton" class="avatar-button" type="button" aria-haspopup="true" aria-expanded="false">
                    <span id="userAvatar" class="user-avatar"></span>
                </button>
                <div id="userDropdown" class="user-dropdown" hidden>
                    <button id="logoutButton" class="dropdown-item" type="button">Wyloguj</button>
                </div>
            </div>
        </div>

        <div class="heading">
            <p class="eyebrow">Spring Boot 4</p>
            <h1>Upload dwoch plikow</h1>
        </div>

        <form id="uploadForm" class="form">
            <div class="dropzone-grid">
                <label class="field dropzone" for="firstFile">
                    <span class="field-title">Pierwszy plik</span>
                    <span class="dropzone-copy">Przeciagnij plik tutaj albo kliknij</span>
                    <span id="firstFileName" class="file-name">Nie wybrano pliku</span>
                    <input id="firstFile" name="firstFile" type="file" required>
                </label>

                <label class="field dropzone" for="secondFile">
                    <span class="field-title">Drugi plik</span>
                    <span class="dropzone-copy">Przeciagnij plik tutaj albo kliknij</span>
                    <span id="secondFileName" class="file-name">Nie wybrano pliku</span>
                    <input id="secondFile" name="secondFile" type="file" required>
                </label>
            </div>

            <button id="submitButton" type="submit">
                <span id="submitLoader" class="loader" aria-hidden="true" hidden></span>
                <span id="submitLabel">Wyslij</span>
            </button>
        </form>

        <section id="response" class="response" hidden>
            <h2>Odpowiedz</h2>
            <dl>
                <div>
                    <dt>result</dt>
                    <dd id="resultValue"></dd>
                </div>
                <div>
                    <dt>pdfFileInBase64</dt>
                    <dd><textarea id="base64Value" readonly></textarea></dd>
                </div>
            </dl>
            <a id="downloadPdfLink" class="download-link" href="#" download="decoded.pdf" hidden>Pobierz PDF</a>
        </section>

        <p id="error" class="error" role="alert" hidden></p>
    </section>
</main>

<script src="http://localhost:8085/js/keycloak.js"></script>
<script src="/app.js"></script>
</body>
</html>
